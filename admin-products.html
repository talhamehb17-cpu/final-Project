<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Admin Dashboard</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <script src="/js/admin-utils.js"></script>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="/images/logo.png" alt="NightHowls Logo">
                    <span>NIGHTHOWLS</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="admin-dashboard.html" class="nav-link" data-page="dashboard">
                            <i class="fas fa-chart-line"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="admin-products.html" class="nav-link active" data-page="products">
                            <i class="fas fa-box"></i>
                            <span>Products</span>
                        </a>
                    </li>
                    <li>
                        <a href="admin-orders.html" class="nav-link" data-page="orders">
                            <i class="fas fa-shopping-bag"></i>
                            <span>Orders</span>
                        </a>
                    </li>
                    <li>
                        <a href="admin-customers.html" class="nav-link" data-page="customers">
                            <i class="fas fa-users"></i>
                            <span>Customers</span>
                        </a>
                    </li>
                    <li>
                        <a href="admin-inventory.html" class="nav-link" data-page="inventory">
                            <i class="fas fa-warehouse"></i>
                            <span>Inventory</span>
                        </a>
                    </li>
                    <li>
                        <a href="admin-analytics.html" class="nav-link" data-page="analytics">
                            <i class="fas fa-chart-bar"></i>
                            <span>Analytics</span>
                        </a>
                    </li>
                    <li>
                        <a href="admin-promo-codes.html" class="nav-link" data-page="promo-codes">
                            <i class="fas fa-tags"></i>
                            <span>Promo Codes</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div class="admin-info">
                    <div class="admin-avatar">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <div class="admin-details">
                        <div class="admin-name" id="adminName">Admin</div>
                        <div class="admin-email" id="adminEmail"></div>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="admin-main">
            <!-- Top Bar -->
            <header class="admin-header">
                <div class="header-left">
                    <button class="mobile-menu-toggle" id="mobileMenuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Products</h1>
                </div>
                <div class="header-right">
                    <button class="btn-primary" id="addProductBtn">
                        <i class="fas fa-plus"></i>
                        <span>Add Product</span>
                    </button>
                    <a href="index.html" class="view-store-btn" target="_blank">
                        <i class="fas fa-external-link-alt"></i>
                        <span>View Store</span>
                    </a>
                </div>
            </header>
            
            <!-- Products Content -->
            <div class="admin-content">
                <!-- Search and Filters -->
                <div class="search-bar">
                    <input type="text" class="search-input" id="searchProducts" placeholder="Search products by name or category...">
                    <select class="form-control" id="categoryFilter" style="width: 200px;">
                        <option value="">All Categories</option>
                        <option value="fashion">Fashion</option>
                        <option value="home">Home & Living</option>
                        <option value="accessories">Accessories</option>
                        <option value="electronics">Electronics</option>
                    </select>
                </div>
                
                <!-- Products Table -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Product Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTable">
                            <tr>
                                <td colspan="6" class="loading-row">Loading products...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>
    
    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Product</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <div class="form-group">
                        <label for="productName">Product Name *</label>
                        <input type="text" class="form-control" id="productName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="productCategory">Category *</label>
                        <select class="form-control" id="productCategory" required>
                            <option value="">Select Category</option>
                            <option value="fashion">Fashion</option>
                            <option value="home">Home & Living</option>
                            <option value="accessories">Accessories</option>
                            <option value="electronics">Electronics</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="productPrice">Price *</label>
                        <input type="number" class="form-control" id="productPrice" step="0.01" min="0" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="productOldPrice">Old Price (Optional)</label>
                        <input type="number" class="form-control" id="productOldPrice" step="0.01" min="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="productImage">Image URL</label>
                        <input type="text" class="form-control" id="productImage" placeholder="https://example.com/image.jpg">
                    </div>
                    
                    <div class="form-group">
                        <label for="productImages">Additional Images (comma-separated URLs)</label>
                        <input type="text" class="form-control" id="productImages" placeholder="https://example.com/image1.jpg, https://example.com/image2.jpg">
                    </div>
                    
                    <div class="form-group">
                        <label for="productDescription">Description</label>
                        <textarea class="form-control" id="productDescription" rows="3"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="productSizes">Sizes (comma-separated)</label>
                        <input type="text" class="form-control" id="productSizes" placeholder="S, M, L, XL">
                    </div>
                    
                    <div class="form-group">
                        <label for="productColors">Colors (comma-separated)</label>
                        <input type="text" class="form-control" id="productColors" placeholder="black, white, red">
                    </div>
                    
                    <div class="form-group">
                        <label for="productStock">Stock *</label>
                        <input type="number" class="form-control" id="productStock" min="0" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelBtn">Cancel</button>
                <button class="btn-primary" id="saveProductBtn">Save Product</button>
            </div>
        </div>
    </div>

    <script src="/js/admin-products.js"></script>
</body>
</html>
