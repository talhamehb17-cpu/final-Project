<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NightHowls</title>
    <meta name="description" content="Admin login for NightHowls E-commerce">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <script src="/js/admin-utils.js"></script>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-login-header">
                <div class="admin-logo">
                    <img src="/images/logo.png" alt="NightHowls Logo">
                    <span>NIGHTHOWLS</span>
                </div>
                <h1>Admin Panel</h1>
                <p>Sign in to manage your store</p>
            </div>
            
            <form id="adminLoginForm" class="admin-login-form">
                <div class="form-group">
                    <label for="adminEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="adminEmail" placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="adminPassword" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" id="toggleAdminPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group checkbox-group">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberAdmin">
                        <span>Remember me</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary admin-login-btn" id="adminLoginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loading" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i> Signing in...
                    </span>
                </button>
                
                <div id="adminLoginError" class="error-message" style="display: none;"></div>
            </form>
            
            <div class="admin-login-footer">
                <a href="main.html" class="back-to-store">
                    <i class="fas fa-arrow-left"></i> Back to Store
                </a>
            </div>
        </div>
    </div>

    <script src="/js/admin-login.js"></script>
</body>
</html>
